<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Working Calculator</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#667eea,#764ba2);

}



.calculator{

    width:330px;

    padding:20px;

    border-radius:20px;

    background:white;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,0.4);

    animation:zoom .5s ease;

}



@keyframes zoom{

from{
    transform:scale(.5);
    opacity:0;
}

to{
    transform:scale(1);
    opacity:1;
}

}



#display{

    width:100%;
    height:70px;

    font-size:32px;

    text-align:right;

    padding:10px;

    border:none;

    background:#eee;

    border-radius:10px;

    margin-bottom:20px;

}




.buttons{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:10px;

}



button{

    height:60px;

    font-size:22px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    transition:.3s;

}



button:hover{

    background:#2196f3;
    color:white;

    transform:scale(1.1);

}



.equal{

    background:#00c853;
    color:white;

}


.clear{

    background:red;
    color:white;

}


</style>

</head>



<body>


<div class="calculator">


<input id="display" readonly>


<div class="buttons">


<button class="clear">C</button>

<button>DEL</button>

<button>/</button>

<button>*</button>



<button>7</button>
<button>8</button>
<button>9</button>
<button>-</button>



<button>4</button>
<button>5</button>
<button>6</button>
<button>+</button>



<button>1</button>
<button>2</button>
<button>3</button>

<button class="equal">=</button>



<button>0</button>

<button>.</button>


</div>


</div>





<script>


let display =
document.getElementById("display");


let buttons =
document.querySelectorAll("button");




// Mouse Click Handling

buttons.forEach(button=>{


button.onclick=function(){


let value =
this.innerHTML;



if(value==="C"){

display.value="";

}



else if(value==="DEL"){

display.value =
display.value.slice(0,-1);

}



else if(value==="="){


try{


display.value =
eval(display.value);


}


catch{


display.value =
"Error";


}


}



else{


display.value += value;


}



}


});





// Keyboard Handling


document.addEventListener(
"keydown",
function(e){



if(
"0123456789+-*/."
.includes(e.key)
){


display.value += e.key;


}



else if(e.key==="Enter"){

display.value =
eval(display.value);

}



else if(e.key==="Backspace"){


display.value =
display.value.slice(0,-1);


}



});


</script>



</body>

</html>
